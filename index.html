<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0F0F14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Finanças • Vinicius</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  :root {
    --bg: #0F0F14;
    --bg-card: #1A1A24;
    --bg-elevated: #252533;
    --bg-hover: #2D2D3F;
    --border: #2D2D3F;
    --text: #F1F5F9;
    --text-secondary: #94A3B8;
    --text-muted: #64748B;
    --accent: #60A5FA;
    --success: #34D399;
    --warning: #FBBF24;
    --danger: #F87171;
    --purple: #A78BFA;
    --pink: #F472B6;
    --radius: 12px;
    --radius-sm: 8px;
  }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.5;
    overscroll-behavior: none;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* HEADER */
  .header {
    padding: 16px 20px 12px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .header-title {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .header-subtitle {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .icon-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 14px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .icon-btn:hover {
    background: var(--bg-hover);
    border-color: var(--accent);
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 6px;
    padding: 12px 16px;
    overflow-x: auto;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    padding: 8px 14px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    color: var(--text-secondary);
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    transition: all 0.15s;
  }

  .tab.active {
    background: var(--accent);
    color: #0F172A;
    border-color: var(--accent);
    font-weight: 600;
  }

  /* CONTENT */
  .content {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 16px;
    -webkit-overflow-scrolling: touch;
  }

  .content::-webkit-scrollbar {
    width: 8px;
  }
  .content::-webkit-scrollbar-track { background: var(--bg); }
  .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .page { display: none; }
  .page.active { display: block; animation: fadeIn 0.2s; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* SELETOR MÊS/ANO */
  .period-selector {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    align-items: center;
  }

  .period-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.15s;
  }

  .period-btn:hover { background: var(--bg-hover); }

  .period-display {
    font-size: 14px;
    color: var(--text-secondary);
    margin-left: auto;
  }

  /* CARDS */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }

  @media (min-width: 768px) {
    .cards-grid {
      grid-template-columns: repeat(4, 1fr);
    }
  }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: var(--accent);
  }

  .card.success::before { background: var(--success); }
  .card.warning::before { background: var(--warning); }
  .card.danger::before { background: var(--danger); }
  .card.purple::before { background: var(--purple); }
  .card.pink::before { background: var(--pink); }

  .card-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .card-value {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--accent);
  }

  .card.success .card-value { color: var(--success); }
  .card.warning .card-value { color: var(--warning); }
  .card.danger .card-value { color: var(--danger); }
  .card.purple .card-value { color: var(--purple); }
  .card.pink .card-value { color: var(--pink); }

  /* SECTION */
  .section {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
  }

  .section-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .section-title .accent { color: var(--accent); }

  /* TABELA */
  .table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  .table th {
    text-align: left;
    padding: 10px 8px;
    color: var(--text-muted);
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
  }

  .table td {
    padding: 10px 8px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }

  .table tr:hover td {
    background: var(--bg-hover);
  }

  .table .num {
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  /* CATEGORIA TAGS */
  .tag {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .tag-success { background: rgba(52, 211, 153, 0.15); color: var(--success); }
  .tag-danger { background: rgba(248, 113, 113, 0.15); color: var(--danger); }
  .tag-warning { background: rgba(251, 191, 36, 0.15); color: var(--warning); }
  .tag-accent { background: rgba(96, 165, 250, 0.15); color: var(--accent); }
  .tag-purple { background: rgba(167, 139, 250, 0.15); color: var(--purple); }
  .tag-pink { background: rgba(244, 114, 182, 0.15); color: var(--pink); }
  .tag-muted { background: rgba(100, 116, 139, 0.2); color: var(--text-secondary); }

  /* FAB - Botão flutuante */
  .fab {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--accent);
    color: #0F172A;
    border: none;
    font-size: 24px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(96, 165, 250, 0.4);
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s;
  }

  .fab:hover { transform: scale(1.05); }
  .fab:active { transform: scale(0.95); }

  /* MODAL */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    z-index: 100;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }

  @media (min-width: 768px) {
    .modal-backdrop { align-items: center; }
  }

  .modal-backdrop.show { display: flex; }

  .modal {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius) var(--radius) 0 0;
    width: 100%;
    max-width: 500px;
    max-height: 90vh;
    overflow-y: auto;
    padding: 20px;
    animation: slideUp 0.2s;
  }

  @media (min-width: 768px) {
    .modal { border-radius: var(--radius); }
  }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 16px;
  }

  .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 20px;
  }

  /* FORM */
  .form-group {
    margin-bottom: 14px;
  }

  .form-label {
    display: block;
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 6px;
    font-weight: 500;
  }

  .form-input, .form-select, .form-textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    font-size: 15px;
    font-family: inherit;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }

  .form-input:focus, .form-select:focus, .form-textarea:focus {
    outline: none;
    border-color: var(--accent);
  }

  .form-textarea {
    resize: vertical;
    min-height: 60px;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  /* BUTTONS */
  .btn {
    flex: 1;
    padding: 12px 16px;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }

  .btn-primary {
    background: var(--accent);
    color: #0F172A;
  }
  .btn-primary:hover { opacity: 0.9; }

  .btn-secondary {
    background: var(--bg-elevated);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: var(--bg-hover); }

  .btn-danger {
    background: rgba(248, 113, 113, 0.15);
    color: var(--danger);
    border: 1px solid var(--danger);
  }

  /* CATEGORIAS BAR */
  .cat-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }

  .cat-bar-label {
    flex: 1;
    font-size: 13px;
    font-weight: 500;
  }

  .cat-bar-value {
    font-variant-numeric: tabular-nums;
    font-weight: 600;
    font-size: 13px;
  }

  .cat-bar-progress {
    height: 6px;
    background: var(--bg-elevated);
    border-radius: 3px;
    margin-bottom: 12px;
    overflow: hidden;
  }

  .cat-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.3s;
  }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
  }

  .empty-icon {
    font-size: 40px;
    margin-bottom: 12px;
    opacity: 0.5;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg-elevated);
    border: 1px solid var(--accent);
    color: var(--text);
    padding: 12px 20px;
    border-radius: var(--radius-sm);
    z-index: 200;
    font-size: 14px;
    font-weight: 500;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
    animation: toastIn 0.3s;
  }

  @keyframes toastIn {
    from { transform: translate(-50%, 20px); opacity: 0; }
    to { transform: translate(-50%, 0); opacity: 1; }
  }

  /* LIST ITEM */
  .list-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .list-item:hover {
    border-color: var(--accent);
    background: var(--bg-hover);
  }

  .list-item-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 6px;
  }

  .list-item-title {
    font-weight: 600;
    font-size: 14px;
  }

  .list-item-value {
    font-weight: 700;
    font-size: 15px;
    font-variant-numeric: tabular-nums;
  }

  .list-item-meta {
    display: flex;
    gap: 8px;
    align-items: center;
    font-size: 12px;
    color: var(--text-muted);
    flex-wrap: wrap;
  }

  /* DOT separator */
  .dot {
    width: 3px;
    height: 3px;
    background: var(--text-muted);
    border-radius: 50%;
    display: inline-block;
  }

  /* HEADER bottom row de import/export */
  .header-actions {
    display: flex;
    gap: 8px;
  }

  /* SCROLL hint para tabela em mobile */
  .table-wrapper {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    margin: 0 -16px;
    padding: 0 16px;
  }

  /* PROGRESS RING (meta) */
  .progress-ring {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 12px 0;
  }

  .progress-ring-svg {
    transform: rotate(-90deg);
  }

  .progress-ring-circle {
    fill: none;
    stroke: var(--bg-elevated);
    stroke-width: 8;
  }

  .progress-ring-fill {
    fill: none;
    stroke: var(--accent);
    stroke-width: 8;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.5s;
  }

  /* CHARTS */
  .chart-container {
    height: 240px;
    margin: 16px -8px 0;
    position: relative;
  }

  .chart-bar {
    transition: opacity 0.2s;
    cursor: pointer;
  }

  .chart-bar:hover { opacity: 0.8; }

  .chart-label {
    font-size: 10px;
    fill: var(--text-muted);
  }

  .chart-grid {
    stroke: var(--border);
    stroke-dasharray: 2 4;
  }

  /* BADGE */
  .badge {
    display: inline-block;
    background: var(--danger);
    color: white;
    border-radius: 10px;
    padding: 1px 6px;
    font-size: 10px;
    font-weight: 700;
    margin-left: 4px;
  }

  /* SWITCH */
  .switch {
    position: relative;
    display: inline-block;
    width: 44px;
    height: 24px;
  }

  .switch input {
    opacity: 0;
    width: 0;
    height: 0;
  }

  .slider {
    position: absolute;
    cursor: pointer;
    inset: 0;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    transition: 0.2s;
    border-radius: 24px;
  }

  .slider:before {
    position: absolute;
    content: "";
    height: 18px;
    width: 18px;
    left: 2px;
    bottom: 2px;
    background: var(--text);
    transition: 0.2s;
    border-radius: 50%;
  }

  input:checked + .slider {
    background: var(--accent);
  }

  input:checked + .slider:before {
    transform: translateX(20px);
    background: #0F172A;
  }

  /* SAFE AREA pra iPhone */
  @supports(padding: max(0px)) {
    .header { padding-top: max(16px, env(safe-area-inset-top)); }
    .fab { bottom: max(24px, env(safe-area-inset-bottom)); }
    .content { padding-bottom: max(80px, env(safe-area-inset-bottom)); }
  }
</style>
</head>
<body>

<!-- LOCK SCREEN -->
<div id="lockScreen" style="display:flex;position:fixed;inset:0;z-index:1000;background:var(--bg);flex-direction:column;align-items:center;justify-content:center;padding:20px">
  <div style="font-size:48px;margin-bottom:8px">🔐</div>

  <div id="pinDisplay" style="font-size:32px;letter-spacing:12px;margin-bottom:8px;height:48px;font-weight:700;color:var(--accent);min-width:200px;text-align:center"></div>
  
  <div id="lockError" style="font-size:13px;color:var(--danger);height:18px;margin-bottom:16px"></div>
  
  <div style="display:grid;grid-template-columns:repeat(3,72px);gap:12px;margin-bottom:16px">

    <button class="pin-btn" data-key="2">2</button>
    <button class="pin-btn" data-key="3">3</button>
    <button class="pin-btn" data-key="4">4</button>
    <button class="pin-btn" data-key="5">5</button>
    <button class="pin-btn" data-key="6">6</button>
    <button class="pin-btn" data-key="7">7</button>

    <button class="pin-btn" data-key="9">9</button>

    <button class="pin-btn pin-btn-action" data-key="ok">✓</button>

  <button id="lockImportBtn" style="background:none;border:none;color:var(--text-muted);font-size:13px;cursor:pointer;text-decoration:underline;margin-top:8px;display:none">Importar dados de backup</button>
</div>

<style>
  .pin-btn {
    width: 72px;

    border-radius: 50%;

    color: var(--text);

  }
  .pin-btn[data-key="ok"]:active {

  }
  
  /* Animação de erro */
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }

  }
  .shake {
    animation: shake 0.3s;
  }
</style>

<script>

// DATA STORAGE
// ============================================================
const STORAGE_KEY = 'financas_vinicius';

const DEFAULT_DATA = {

  },
  receitas: [

    { id: 2, dataPrev: '2026-05-20', categoria: 'Salário', valor: null, descricao: 'Adiantamento (Dia 20)', dataReceb: null },

function nextId(arr) {
  return arr.length === 0 ? 1 : Math.max(...arr.map(x => x.id || 0)) + 1;

// ============================================================
// HELPERS
// ============================================================
function fmt(n) {
  if (n === null || n === undefined || isNaN(n)) return 'R$ 0,00';
  return n.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}

function fmtDate(d) {
  if (!d) return '-';
  const [y, m, day] = d.split('-');
  return `${day}/${m}/${y}`;
}

function pad(n) { return String(n).padStart(2, '0'); }

function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function parseDate(s) {
  if (!s) return null;
  return new Date(s + 'T00:00:00');
}

let CURRENT_PERIOD = {
  month: 5,
  year: 2026
};

// ============================================================
// CÁLCULOS
// ============================================================
function calcSaldoAtual() {
  const corte = parseDate(DATA.config.dataCorte);
  let saldo = DATA.config.saldoInicial;
  
  // Receitas com dataReceb >= corte
  DATA.receitas.forEach(r => {
    if (r.dataReceb && r.valor) {
      const d = parseDate(r.dataReceb);
      if (d >= corte) saldo += r.valor;
    }
  });
  
  // Despesas com dataPgto >= corte
  DATA.despesas.forEach(d => {
    if (d.dataPgto && d.valor) {
      const dt = parseDate(d.dataPgto);
      if (dt >= corte) saldo -= d.valor;
    }
  });
  
  // Empréstimos PRÓPRIOS pagos (capital volta) com dataPgto >= corte
  DATA.emprestimos.forEach(e => {
    if (e.origem === 'Próprio' && e.dataPgto) {
      const d = parseDate(e.dataPgto);
      if (d >= corte) saldo += e.valor;
    }
  });
  
  // Empréstimos PRÓPRIOS novos (capital saiu) com dataEmp > corte
  DATA.emprestimos.forEach(e => {
    if (e.origem === 'Próprio' && e.dataEmp) {
      const d = parseDate(e.dataEmp);
      if (d > corte) saldo -= e.valor;
    }
  });
  
  // Empréstimos de TERCEIRO pagos: capital ENTRA na conta (até ser devolvido)
  DATA.emprestimos.forEach(e => {
    if (e.origem === 'Terceiro' && e.dataPgto) {
      const d = parseDate(e.dataPgto);
      if (d >= corte) saldo += e.valor;
    }
  });
  
  // Devoluções pra terceiros: SAI do saldo
  if (DATA.devolucoes) {
    DATA.devolucoes.forEach(dev => {
      if (dev.data && dev.valor) {
        const d = parseDate(dev.data);
        if (d >= corte) saldo -= dev.valor;
      }
    });
  }
  
  return saldo;
}

function calcCapitalProprioRodando() {
  return DATA.emprestimos
    .filter(e => e.origem === 'Próprio' && getStatus(e) !== 'Pago')
    .reduce((s, e) => s + (e.valor || 0), 0);
}

function calcCapitalTerceiros() {
  return DATA.emprestimos
    .filter(e => e.origem === 'Terceiro' && getStatus(e) !== 'Pago')
    .reduce((s, e) => s + (e.valor || 0), 0);
}

function calcInvestimentos() {
  let aportes = 0, resgates = 0, rendimentos = 0;
  DATA.investimentos.forEach(i => {
    if (i.movimento === 'Aporte') aportes += i.valor || 0;
    else if (i.movimento === 'Resgate') resgates += i.valor || 0;
    else if (i.movimento === 'Rendimento') rendimentos += i.valor || 0;
  });
  return { total: aportes - resgates, rendimentos };
}

function calcPatrimonio() {
  return calcSaldoAtual() + calcCapitalProprioRodando() + calcInvestimentos().total + (calcMetaAcumulada());
}

function calcMetaAcumulada() {
  return (DATA.metas.aportes || []).reduce((s, a) => s + (a.valor || 0), 0);
}

function getStatus(e) {
  if (!e.valor) return '';
  if (e.dataPgto) return 'Pago';
  const hoje = new Date();
  hoje.setHours(0,0,0,0);
  const acordada = parseDate(e.dataAcordada);
  if (acordada && hoje > acordada) return 'Atrasado';
  return 'Em aberto';
}

function calcReceitasMes(mes, ano, categoria = null) {
  return DATA.receitas
    .filter(r => {
      if (!r.dataReceb || !r.valor) return false;
      const d = parseDate(r.dataReceb);
      if (d.getMonth()+1 !== mes || d.getFullYear() !== ano) return false;
      if (categoria && r.categoria !== categoria) return false;
      return true;
    })
    .reduce((s, r) => s + r.valor, 0);
}

function calcDespesasPagas(mes, ano, categoria = null, necessario = null) {
  return DATA.despesas
    .filter(d => {
      if (!d.dataPgto || !d.valor) return false;
      const dt = parseDate(d.dataPgto);
      if (dt.getMonth()+1 !== mes || dt.getFullYear() !== ano) return false;
      if (categoria && d.categoria !== categoria) return false;
      if (necessario !== null && d.necessario !== necessario) return false;
      return true;
    })
    .reduce((s, d) => s + d.valor, 0);
}

function calcDespesasPendentes(mes, ano, categoria = null) {
  return DATA.despesas
    .filter(d => {
      if (d.dataPgto || !d.valor || !d.data) return false;
      const dt = parseDate(d.data);
      if (dt.getMonth()+1 !== mes || dt.getFullYear() !== ano) return false;
      if (categoria && d.categoria !== categoria) return false;
      return true;
    })
    .reduce((s, d) => s + d.valor, 0);
}

function render() {
  const tab = document.querySelector('.tab.active').dataset.page;
  const content = document.getElementById('content');
  
  // FAB visibility
  const fab = document.getElementById('fab');
  if (['receitas', 'despesas', 'emprestimos', 'investimentos'].includes(tab)) {
    fab.style.display = 'flex';
  } else if (tab === 'metas') {
    fab.style.display = 'flex';
  } else if (tab === 'devolucoes') {
    fab.style.display = 'flex';
  } else {
    fab.style.display = 'none';
  }
  
  switch (tab) {
    case 'dashboard': content.innerHTML = renderDashboard(); break;
    case 'receitas': content.innerHTML = renderReceitas(); break;
    case 'despesas': content.innerHTML = renderDespesas(); break;
    case 'emprestimos': content.innerHTML = renderEmprestimos(); break;
    case 'capitais': content.innerHTML = renderCapitais(); break;
    case 'investimentos': content.innerHTML = renderInvestimentos(); break;
    case 'metas': content.innerHTML = renderMetas(); break;
    case 'patrimonio': content.innerHTML = renderPatrimonio(); break;
    case 'devolucoes': content.innerHTML = renderDevolucoes(); break;
    case 'analise': content.innerHTML = renderAnalise(); break;
    case 'config': content.innerHTML = renderConfig(); break;
  }
  
  // Period selector listener
  const monthBtn = document.getElementById('monthBtn');
  const yearBtn = document.getElementById('yearBtn');
  if (monthBtn) {
    monthBtn.onclick = () => {
      CURRENT_PERIOD.month = (CURRENT_PERIOD.month % 12) + 1;
      render();
    };
  }
  if (yearBtn) {
    yearBtn.onclick = () => {
      CURRENT_PERIOD.year++;
      if (CURRENT_PERIOD.year > 2030) CURRENT_PERIOD.year = 2024;
      render();
    };
  }
}

    const sa = getStatus(a), sb = getStatus(b);
    const order = { 'Atrasado': 0, 'Em aberto': 1, 'Pago': 2 };
    if (order[sa] !== order[sb]) return order[sa] - order[sb];
    return (a.dataAcordada || '').localeCompare(b.dataAcordada || '');
  });
  
  if (sorted.length === 0) {
    return `<div class="empty"><div class="empty-icon">🤝</div><div>Nenhum empréstimo</div></div>`;
  }
  
  return `
    <div class="section">
      <div class="section-title">Empréstimos</div>
      ${sorted.map(e => {
        const status = getStatus(e);
        const totalReceber = (e.valor || 0) * (1 + (e.juros || 0));
        const tag = { 'Pago': 'success', 'Atrasado': 'danger', 'Em aberto': 'warning' }[status];
        return `
        <div class="list-item" onclick="editEmprestimo(${e.id})">
          <div class="list-item-header">
            <div>
              <div class="list-item-title">${e.nome}</div>
              <div class="list-item-meta">
                <span class="tag tag-${tag}">${status}</span>
                <span class="tag tag-${e.origem === 'Próprio' ? 'accent' : 'purple'}">${e.origem}</span>
                <span>📅 vence ${fmtDate(e.dataAcordada)}</span>
              </div>
            </div>
            <div style="text-align:right">
              <div class="list-item-value">${fmt(totalReceber)}</div>
              <div style="font-size:11px;color:var(--text-muted);margin-top:2px">${fmt(e.valor)} + ${((e.juros || 0)*100).toFixed(0)}%</div>
            </div>
          </div>
        </div>
      `}).join('')}
    </div>
  `;
}

}

function renderBarChart(data, colors, maxVal) {
  const W = 320, H = 180;
  const barGroupWidth = (W - 20) / data.length;
  const numSeries = data[0].values.length;
  const barWidth = (barGroupWidth - 4) / numSeries;
  
  let bars = '';
  data.forEach((d, i) => {
    d.values.forEach((v, j) => {
      const h = maxVal > 0 ? (v / maxVal) * (H - 30) : 0;
      const x = 10 + i * barGroupWidth + j * barWidth + 1;
      const y = H - 20 - h;
      bars += `<rect class="chart-bar" x="${x}" y="${y}" width="${barWidth - 2}" height="${h}" fill="${colors[j]}" rx="2"></rect>`;
    });
    bars += `<text class="chart-label" x="${10 + i * barGroupWidth + barGroupWidth/2}" y="${H - 5}" text-anchor="middle">${d.label}</text>`;
  });
  
  return `<div class="chart-container">
    <svg width="100%" height="100%" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
      <line class="chart-grid" x1="10" y1="${H-20}" x2="${W-10}" y2="${H-20}"></line>
      ${bars}
    </svg>
  </div>`;
}

function renderDevolucoes() {
  // Garantir estruturas
  if (!DATA.devolucoes) DATA.devolucoes = [];
  if (!DATA.donosTerceiros) DATA.donosTerceiros = ['Pai', 'Santander Pix Crédito'];
  
  // Calcular saldo por dono
  const saldosPorDono = {};
  DATA.donosTerceiros.forEach(dono => {
    saldosPorDono[dono] = {
      capitalRecebido: 0, // capital de terceiro pago pelo cliente (entrou na conta)
      jaDevolvido: 0,     // devoluções feitas pra esse dono
      capitalEmAberto: 0, // capital ainda emprestado
      jurosRecebidos: 0,  // juros já recebidos desse dono
    };
  });
  
  DATA.emprestimos.forEach(e => {
    if (e.origem !== 'Terceiro') return;
    const dono = e.donoTerceiro || 'Pai';
    if (!saldosPorDono[dono]) {
      saldosPorDono[dono] = { capitalRecebido: 0, jaDevolvido: 0, capitalEmAberto: 0, jurosRecebidos: 0 };
    }
    
    const status = getStatus(e);
    if (status === 'Pago') {
      saldosPorDono[dono].capitalRecebido += e.valor || 0;
      saldosPorDono[dono].jurosRecebidos += (e.valor || 0) * (e.juros || 0);
    } else {
      saldosPorDono[dono].capitalEmAberto += e.valor || 0;
    }
  });
  
  DATA.devolucoes.forEach(d => {
    if (saldosPorDono[d.dono]) {
      saldosPorDono[d.dono].jaDevolvido += d.valor || 0;
    }
  });
  
  // Calcular pendentes
  let totalPendente = 0;
  let temPendencia = false;
  Object.keys(saldosPorDono).forEach(dono => {
    const s = saldosPorDono[dono];
    s.pendente = s.capitalRecebido - s.jaDevolvido;
    if (s.pendente > 0.01) {
      totalPendente += s.pendente;
      temPendencia = true;
    }
  });
  
  return `
    ${temPendencia ? `
      <div class="section" style="border-color:var(--danger);background:rgba(248,113,113,0.05)">
        <div class="section-title" style="color:var(--danger)">⚠️ Capital a devolver</div>
        <div style="font-size:24px;font-weight:700;color:var(--danger);margin-bottom:4px">${fmt(totalPendente)}</div>
        <div style="font-size:12px;color:var(--text-secondary)">Esse valor está na sua conta, mas pertence a outras pessoas. Devolva o quanto antes.</div>
      </div>
    ` : `
      <div class="section" style="background:rgba(52,211,153,0.05);border-color:var(--success)">
        <div style="text-align:center;padding:8px;color:var(--success);font-weight:600">✓ Nenhuma devolução pendente</div>
      </div>
    `}
    
    ${Object.keys(saldosPorDono).map(dono => {
      const s = saldosPorDono[dono];
      const cor = s.pendente > 0.01 ? 'var(--danger)' : 'var(--success)';
      return `
        <div class="section">
          <div class="section-title">
            <span>👤 ${dono}</span>
            <button class="icon-btn" onclick="openDevolucaoModal(null, '${dono.replace(/'/g, "\\'")}')">+ Devolver</button>
          </div>
          
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
            <div>
              <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase">Em aberto (com clientes)</div>
              <div style="font-weight:600">${fmt(s.capitalEmAberto)}</div>
            </div>
            <div>
              <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase">Já recebido (cliente pagou)</div>
              <div style="font-weight:600">${fmt(s.capitalRecebido)}</div>
            </div>
            <div>
              <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase">Já devolvido pra ele</div>
              <div style="color:var(--success);font-weight:600">${fmt(s.jaDevolvido)}</div>
            </div>
            <div>
              <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase">Pendente devolver</div>
              <div style="color:${cor};font-weight:700;font-size:16px">${fmt(s.pendente)}</div>
            </div>
          </div>
          
          <div style="border-top:1px solid var(--border);padding-top:8px;margin-top:8px">
            <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;margin-bottom:4px">💰 Meu lucro com esse dono</div>
            <div style="color:var(--success);font-weight:600">${fmt(s.jurosRecebidos)} de juros recebidos</div>
          </div>
        </div>
      `;
    }).join('')}
    
    <div class="section">
      <div class="section-title">📋 Histórico de devoluções</div>
      ${DATA.devolucoes.length === 0 ? `
        <div style="text-align:center;padding:20px;color:var(--text-muted)">Nenhuma devolução ainda</div>
      ` : [...DATA.devolucoes].sort((a,b) => (b.data||'').localeCompare(a.data||'')).map(d => `
        <div class="list-item" onclick="openDevolucaoModal(${d.id})">
          <div class="list-item-header">
            <div>
              <div class="list-item-title">${d.dono}</div>
              <div class="list-item-meta">
                <span>📅 ${fmtDate(d.data)}</span>
                ${d.obs ? `<span>${d.obs}</span>` : ''}
              </div>
            </div>
            <div class="list-item-value" style="color:var(--danger)">- ${fmt(d.valor)}</div>
          </div>
        </div>
      `).join('')}
    </div>
    
    <div class="section">
      <div class="section-title">⚙️ Donos cadastrados</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px">
        ${DATA.donosTerceiros.map(d => `<span class="tag tag-purple">${d}</span>`).join('')}
      </div>
      <button class="btn btn-secondary" onclick="addDonoTerceiro()" style="width:100%">+ Adicionar dono</button>
    </div>
  `;
}

function addDonoTerceiro() {
  const nome = prompt('Nome do dono do capital (ex: Pai, João, Empresa X):');
  if (!nome || !nome.trim()) return;
  if (!DATA.donosTerceiros) DATA.donosTerceiros = [];
  if (DATA.donosTerceiros.includes(nome.trim())) {
    showToast('Esse dono já existe');

  DATA.donosTerceiros.push(nome.trim());
  saveData();
  render();
  showToast('Dono adicionado: ' + nome);
}

    <div class="form-group">
      <label class="form-label">Mês/Ano</label>
      <input class="form-input" type="text" id="a_mes" value="${m}/${ano}">
    </div>
    <div class="form-group">
      <label class="form-label">Origem</label>
      <select class="form-select" id="a_origem">
        <option value="Sobra do mês">Sobra do mês</option>
        <option value="Juros">Juros</option>
        <option value="13º/Férias">13º/Férias</option>
        <option value="Bônus">Bônus</option>
        <option value="Extra">Extra</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Valor (R$)</label>
      <input class="form-input" type="number" step="0.01" id="a_valor" value="" inputmode="decimal">
    </div>
    <div class="form-group">
      <label class="form-label">Observação</label>
      <input class="form-input" type="text" id="a_obs" value="">
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveAporte()">Salvar</button>
    </div>
  `);
}

function saveAporte() {
  const a = {
    mes: document.getElementById('a_mes').value,
    origem: document.getElementById('a_origem').value,
    valor: parseFloat(document.getElementById('a_valor').value) || 0,
    obs: document.getElementById('a_obs').value,
  };
  if (!DATA.metas.aportes) DATA.metas.aportes = [];
  DATA.metas.aportes.push(a);
  saveData();
  closeModal();
  render();
  showToast('Aporte adicionado');
}

// ============================================================
// IMPORT / EXPORT
// ============================================================
function exportData() {
  const json = JSON.stringify(DATA, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().split('T')[0];
  a.href = url;
  a.download = `financas_vinicius_${date}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Dados exportados!');
}

function importData() {
  document.getElementById('importFile').click();
}

function handleImport(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!imported.config || !imported.receitas) {
        showToast('Arquivo inválido');
        return;
      }
      if (!confirm('Isso vai SUBSTITUIR todos os dados atuais. Continuar?')) {
        return;
      }
      DATA = imported;
      saveData();
      render();
      showToast('Dados importados com sucesso!');
    } catch (err) {
      showToast('Erro ao importar: ' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = ''; // reset input
}

function resetData() {
  if (!confirm('Tem certeza? Isso vai APAGAR TUDO e começar do zero.')) return;
  if (!confirm('Última chance! Confirma apagar tudo?')) return;
  DATA = {
    config: { saldoInicial: 0, dataCorte: todayISO() },
    receitas: [],
    despesas: [],
    emprestimos: [],
    investimentos: [],
    metas: { valorMeta: 0, aportes: [] }
  };
  saveData();
  render();
  showToast('Tudo apagado!');
}

// ============================================================
// TOAST
// ============================================================
function showToast(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// ============================================================
// TAB NAV
// ============================================================
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('content').scrollTop = 0;
    render();
  });
});

// ============================================================
// LOCK SCREEN (PIN)
// ============================================================
const lockScreen = document.getElementById('lockScreen');
const pinDisplay = document.getElementById('pinDisplay');
const lockError = document.getElementById('lockError');
const lockTitle = document.getElementById('lockTitle');
const lockSubtitle = document.getElementById('lockSubtitle');
const lockImportBtn = document.getElementById('lockImportBtn');

let pinAtual = '';
let pinModo = 'criar'; // 'criar' | 'confirmar' | 'verificar'
let pinCriacao = ''; // armazena pin durante criação
let pinTentativas = 0;

function initLockScreen() {
  if (!DATA.pin) {
    // Primeira vez - criar PIN
    pinModo = 'criar';
    lockTitle.textContent = 'Bem-vindo, Vinicius';
    lockSubtitle.textContent = 'Crie um PIN de 4 a 8 dígitos para proteger seus dados';
    lockImportBtn.style.display = 'block';
  } else {
    // Verificar PIN
    pinModo = 'verificar';
    lockTitle.textContent = 'Digite seu PIN';
    lockSubtitle.textContent = '';
    lockImportBtn.style.display = 'none';
  }
}

function updatePinDisplay() {
  pinDisplay.textContent = '•'.repeat(pinAtual.length);
}

function clearPin() {
  pinAtual = '';
  updatePinDisplay();
  lockError.textContent = '';
}

function confirmPin() {
  if (pinAtual.length < 4) {
    showLockError('Mínimo 4 dígitos');
    return;
  }
  
  if (pinModo === 'criar') {
    pinCriacao = pinAtual;
    pinAtual = '';
    pinModo = 'confirmar';
    lockTitle.textContent = 'Confirme o PIN';
    lockSubtitle.textContent = 'Digite o mesmo PIN novamente';
    updatePinDisplay();
    lockError.textContent = '';
    lockImportBtn.style.display = 'none';
  } else if (pinModo === 'confirmar') {
    if (pinAtual === pinCriacao) {
      // Salvar PIN e desbloquear
      DATA.pin = simpleHash(pinAtual);
      saveData();
      unlock();
    } else {
      showLockError('PIN não confere. Tente de novo.');
      setTimeout(() => {
        pinAtual = '';
        pinCriacao = '';
        pinModo = 'criar';
        lockTitle.textContent = 'Crie seu PIN';
        lockSubtitle.textContent = 'Digite um PIN de 4 a 8 dígitos';
        updatePinDisplay();
        lockError.textContent = '';
      }, 1500);
    }
  } else if (pinModo === 'verificar') {
    if (simpleHash(pinAtual) === DATA.pin) {
      unlock();
    } else {
      pinTentativas++;
      showLockError('PIN incorreto' + (pinTentativas >= 3 ? ' (' + pinTentativas + ' tentativas)' : ''));
      pinAtual = '';
      updatePinDisplay();
    }
  }
}

function unlock() {
  lockScreen.style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('fab').style.display = 'flex';
  render();
}

function showLockError(msg) {
  lockError.textContent = msg;
  pinDisplay.classList.add('shake');
  setTimeout(() => pinDisplay.classList.remove('shake'), 300);
}

function simpleHash(str) {
  // Hash simples (não criptograficamente seguro, mas suficiente pra esconder do localStorage)
  let h = 0;
  for (let i = 0; i < str.length; i++) {
    h = ((h << 5) - h) + str.charCodeAt(i);
    h |= 0;
  }
  // Salt fixo pra dificultar
  return 'pin_' + h + '_' + str.length;
}

// Botões do PIN
document.querySelectorAll('.pin-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const key = btn.dataset.key;
    if (key === 'clear') {
      pinAtual = pinAtual.slice(0, -1);
      updatePinDisplay();
      lockError.textContent = '';
    } else if (key === 'ok') {
      confirmPin();
    } else {
      if (pinAtual.length < 8) {
        pinAtual += key;
        updatePinDisplay();
        lockError.textContent = '';
      }
    }
  });
});

// Suporte a teclado físico no PC
document.addEventListener('keydown', (e) => {
  if (lockScreen.style.display === 'none') return;
  if (e.key >= '0' && e.key <= '9') {
    if (pinAtual.length < 8) {
      pinAtual += e.key;
      updatePinDisplay();
      lockError.textContent = '';
    }
  } else if (e.key === 'Backspace') {
    pinAtual = pinAtual.slice(0, -1);
    updatePinDisplay();
    lockError.textContent = '';
  } else if (e.key === 'Enter') {
    confirmPin();
  }
});

// Importar dados na tela de bloqueio (pra quando você quer restaurar backup)
const lockImportFile = document.getElementById('lockImportFile');
lockImportBtn.addEventListener('click', () => lockImportFile.click());
lockImportFile.addEventListener('change', (event) => {
  const file = event.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!imported.config || !imported.receitas) {
        showLockError('Arquivo inválido');
        return;
      }
      DATA = imported;
      // Garante que estruturas novas existam
      if (!DATA.devolucoes) DATA.devolucoes = [];
      if (!DATA.donosTerceiros) DATA.donosTerceiros = ['Pai'];
      saveData();
      // Re-iniciar tela de bloqueio (pode ter PIN agora)
      initLockScreen();
      pinAtual = '';
      updatePinDisplay();
    } catch (err) {
      showLockError('Erro ao importar');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
});

initLockScreen();
updatePinDisplay();

// FAB começa escondido (até desbloquear)
document.getElementById('fab').style.display = 'none';

// ============================================================
// INIT
// ============================================================
// render() é chamado em unlock()

// ESC fecha modal
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// Service Worker pra funcionar offline
if ('serviceWorker' in navigator) {
  // Não vamos usar SW por simplicidade, mas o app já funciona offline depois de carregado
}
</script>
</body>
</html>
